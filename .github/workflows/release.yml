# =============================================================================
# RELEASE — the single release console for staging & prod
# Repo: mbeema/platform-releases
#
# Two ways to release, both gated by the target environment's required reviewers:
#   • Promote (version blank): ship the latest build from the env below
#     (dev→staging or staging→prod). Supports one, many, or 'all' services.
#   • Pin a specific build (version set): release/redeploy an EXACT version of
#     ONE service — e.g. promote a chosen build, or roll back to a known-good one.
# =============================================================================
name: release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod
        default: staging
      # ---- Pick apps by ticking the boxes below ------------------------------
      # workflow_dispatch has no multi-select, so each app is its own checkbox.
      # `all_apps` is the release-train shortcut (promote everything releasable)
      # and overrides the individual boxes when ticked.
      # ADD A NEW APP: add one boolean here + one line in "Collect selected apps"
      # below. Keep this list in sync with services.json (the registry).
      all_apps:
        description: "ALL apps (release train — ignores the individual boxes below)"
        type: boolean
        default: false
      orders:
        description: "orders"
        type: boolean
        default: false
      payments:
        description: "payments"
        type: boolean
        default: false
      platform_infra:
        description: "platform-infra"
        type: boolean
        default: false
      version:
        description: "Pin an EXACT build (vX.Y.Z tag or sha-xxxxxxx) — tick EXACTLY ONE app. Blank = promote latest from the env below."
        required: false
        default: ""

permissions:
  contents: write     # the ledger commit IS the release record
  id-token: write     # OIDC for the real deploy pipelines (capped by the caller)

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.pick.outputs.services }}   # ticked apps as a comma-list (or 'all')
      matrix: ${{ steps.sel.outputs.selected }}
      has: ${{ steps.sel.outputs.has }}
      matrix_container: ${{ steps.split.outputs.matrix_container }}
      has_container: ${{ steps.split.outputs.has_container }}
      matrix_zip: ${{ steps.split.outputs.matrix_zip }}
      has_zip: ${{ steps.split.outputs.has_zip }}
      matrix_infra: ${{ steps.split.outputs.matrix_infra }}
      has_infra: ${{ steps.split.outputs.has_infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Turn the ticked checkboxes into the comma-list the rest of the pipeline
      # already speaks. `all_apps` wins if set. Read booleans from env (never
      # inline platform-infra in a ${{ }} expr — the hyphen parses as minus).
      - name: Collect selected apps
        id: pick
        env:
          ALL_APPS: ${{ inputs.all_apps }}
          ORDERS: ${{ inputs.orders }}
          PAYMENTS: ${{ inputs.payments }}
          PLATFORM_INFRA: ${{ inputs.platform_infra }}
        run: |
          set -e
          if [ "$ALL_APPS" = "true" ]; then
            echo "services=all" >> "$GITHUB_OUTPUT"
            echo "Selected: all (release train)"; exit 0
          fi
          sel=()
          [ "$ORDERS" = "true" ]         && sel+=("orders")
          [ "$PAYMENTS" = "true" ]       && sel+=("payments")
          [ "$PLATFORM_INFRA" = "true" ] && sel+=("platform-infra")
          if [ ${#sel[@]} -eq 0 ]; then
            echo "::error::pick at least one app (tick a box, or 'all_apps')"; exit 1
          fi
          IFS=,; echo "services=${sel[*]}" >> "$GITHUB_OUTPUT"
          echo "Selected: ${sel[*]}"

      - name: Resolve & pin target ledger
        id: sel
        env:
          GH_TOKEN: ${{ github.token }}
          SVC: ${{ steps.pick.outputs.services }}
          VER: ${{ inputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -e
          if [ -n "$VER" ]; then
            # ---- PIN a specific build (single service) ----
            case "$SVC" in
              *,*|all|ALL) echo "::error::a specific version needs exactly one service"; exit 1;;
            esac
            case "$VER" in
              sha-*)
                IMM="$VER"; SEMVER="" ;;
              *)
                # resolve a semver tag to its immutable build sha in the service repo
                FULL="$(gh api "repos/mbeema/service-${SVC}/commits/${VER}" --jq .sha)"
                IMM="sha-${FULL:0:7}"; SEMVER="$VER" ;;
            esac
            echo "Pinning ${SVC} -> ${IMM} (${SEMVER:-no semver}) in ${ENVIRONMENT}"
            python3 scripts/select_release.py \
              --to-env "${ENVIRONMENT}" \
              --select "$SVC" --version "$IMM" --semver "$SEMVER"
          else
            # ---- PROMOTE from the env below ----
            if [ "$ENVIRONMENT" = "prod" ]; then SRC=staging; else SRC=dev; fi
            echo "Promoting '$SVC' from ${SRC} to ${ENVIRONMENT}"
            python3 scripts/select_release.py \
              --to-env "${ENVIRONMENT}" \
              --from-env "${SRC}" --select "$SVC"
          fi

      # Route each selected service to its pipeline BEFORE recording the
      # release: an unregistered service fails here, leaving the ledger clean.
      - name: Route to deploy pipelines
        id: split
        if: steps.sel.outputs.has == 'true'
        run: |
          python3 scripts/split_matrix.py --selected '${{ steps.sel.outputs.selected }}'

      - name: Record the release
        if: steps.sel.outputs.has == 'true'
        run: |
          git config user.name  "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add ledger
          # A re-pin of the current build (a redeploy or rollback to what is
          # already live) changes no bytes. That is a valid release, not an
          # error — skip the commit but let the deploy proceed.
          if git diff --cached --quiet; then
            echo "Ledger already at this pin — redeploy with no ledger change."
          else
            git commit -m "release(${{ inputs.environment }}): ${{ steps.pick.outputs.services }} ${{ inputs.version }}"
            for i in $(seq 1 5); do
              git pull --rebase --autostash origin main && git push origin HEAD:main && break
              echo "push retry $i"; sleep 3
            done
          fi

      - name: Nothing to release
        if: steps.sel.outputs.has != 'true'
        run: echo "Nothing to release for '${{ steps.pick.outputs.services }}' → ${{ inputs.environment }}."

  # Two jobs, not one: a reusable-workflow `uses:` cannot be selected by a
  # matrix expression, so container and zip services route separately.

  deploy-container:
    needs: select
    if: needs.select.outputs.has_container == 'true'
    strategy:
      fail-fast: false     # one service failing must not strand the others
      matrix:
        target: ${{ fromJson(needs.select.outputs.matrix_container) }}
    # POC: swap to reusable-deploy.yml@v1 to go live. The `with:` block below is
    # already the real one — both workflows take the same inputs — so going live
    # is this one line plus Azure OIDC/ACR/Key Vault access.
    uses: mbeema/platform-pipelines/.github/workflows/reusable-deploy-poc.yml@v1
    with:
      environment: ${{ inputs.environment }}
      app_name: ${{ matrix.target.service }}-${{ inputs.environment }}
      resource_group: rg-platform-${{ inputs.environment }}
      version: ${{ matrix.target.version }}
      # The ledger's sha IS the image tag — the same build promoted, never rebuilt.
      image: ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.target.image_name }}:${{ matrix.target.version }}
      # ...and the same sha checks out the service's changelog + settings, so one
      # pin covers code, migrations and config together.
      service_repo: ${{ matrix.target.repo }}
      ref: ${{ matrix.target.version }}
    secrets: inherit

  # STILL ON THE POC PIPELINE — deliberately.
  # reusable-deploy-zip.yml begins with actions/download-artifact, and artifacts
  # are scoped to the run that produced them. Promoting from platform-releases
  # cannot reach a zip built in the service repo's own run, so wiring this to the
  # real workflow would fail at download-artifact every time. Unblock by giving
  # zip builds a durable sha-keyed store (Azure Artifacts / blob / Packages) and
  # having reusable-deploy-zip pull from there instead.
  deploy-zip:
    needs: select
    if: needs.select.outputs.has_zip == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.select.outputs.matrix_zip) }}
    uses: mbeema/platform-pipelines/.github/workflows/reusable-deploy-poc.yml@v1
    with:
      environment: ${{ inputs.environment }}
      app_name: ${{ matrix.target.service }}-${{ inputs.environment }}
      version: ${{ matrix.target.version }}

  # Shared infra (platform-infra) gated exactly like an app: same environment
  # approval, same ledger pin, same provenance stamp. It deploys the env's Bicep
  # (plans, Key Vault, shared plumbing) from the repo at the released sha. POC:
  # swap to reusable-deploy-infra.yml@v1 to run the real az deployment.
  deploy-infra:
    needs: select
    if: needs.select.outputs.has_infra == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.select.outputs.matrix_infra) }}
    uses: mbeema/platform-pipelines/.github/workflows/reusable-deploy-infra-poc.yml@v1
    with:
      environment: ${{ inputs.environment }}
      resource_group: rg-platform-${{ inputs.environment }}
      infra_repo: ${{ matrix.target.repo }}
      ref: ${{ matrix.target.version }}
      version: ${{ matrix.target.version }}
    secrets: inherit

  # Governance record: WHO released the gate and WHEN. This can only run after
  # the deploys, because approval happens at the gate inside them — it is not
  # known at release time, when the version bump is committed. A skipped deploy
  # (that half of the matrix was empty) is fine; a FAILED one means the release
  # did not happen, so there is nothing to certify.
  record-approval:
    needs: [select, deploy-container, deploy-zip, deploy-infra]
    # !cancelled() forces this to evaluate even though some deploy legs are
    # SKIPPED — without a status function, a skipped need would skip this job
    # before the guards below are ever checked. Then require that select
    # actually committed the release and that at least one deploy SUCCEEDED:
    # certify only a release that really happened, never one that failed after
    # setting has=true or whose deploys were all skipped.
    if: >-
      !cancelled()
      && needs.select.result == 'success'
      && (needs.deploy-container.result == 'success'
          || needs.deploy-zip.result == 'success'
          || needs.deploy-infra.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gather approver and approval time
        id: appr
        env:
          GH_TOKEN: ${{ github.token }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -e
          RID=${{ github.run_id }}
          # WHO: the reviewer(s) who approved THIS environment's gate.
          BY="$(gh api "repos/${{ github.repository }}/actions/runs/${RID}/approvals" \
                --jq "[.[] | select(.state==\"approved\") \
                        | select(any(.environments[]; .name==\"${ENVIRONMENT}\")) \
                        | .user.login] | unique | join(\",\")")"
          # A gate with no required reviewers auto-approves and returns nobody.
          [ -z "$BY" ] && BY="auto (no required reviewers)"
          # WHEN: the moment the gate released == the earliest deploy job start.
          AT="$(gh api "repos/${{ github.repository }}/actions/runs/${RID}/jobs" \
                --jq '[.jobs[] | select(.name|startswith("deploy-")) | .started_at]
                       | map(select(.!=null)) | sort | .[0] // ""')"
          COMMENT="$(gh api "repos/${{ github.repository }}/actions/runs/${RID}/approvals" \
                --jq "[.[] | select(.state==\"approved\") | .comment] | map(select(.!=\"\")) | first // \"\"")"
          echo "by=$BY"   >> "$GITHUB_OUTPUT"
          echo "at=$AT"   >> "$GITHUB_OUTPUT"
          echo "comment=$COMMENT" >> "$GITHUB_OUTPUT"
          echo "Approved by ${BY} at ${AT:-unknown}"

      - name: Stamp approval onto the ledger and commit
        run: |
          git config user.name  "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          # Re-derive the stamp against the CURRENT tip each attempt, rather than
          # rebasing our own commit: select pushed the version bump onto the same
          # files moments ago, and rebasing would conflict. Recomputing is
          # idempotent and conflict-free.
          for i in $(seq 1 5); do
            git fetch -q origin main
            git reset -q --hard origin/main
            python3 scripts/stamp_approval.py \
              --env "${{ inputs.environment }}" \
              --selected '${{ needs.select.outputs.matrix }}' \
              --approved-by "${{ steps.appr.outputs.by }}" \
              --approved-at "${{ steps.appr.outputs.at }}" \
              --run-id "${{ github.run_id }}" \
              --comment "${{ steps.appr.outputs.comment }}"
            git add ledger
            if git diff --cached --quiet; then
              echo "Approval already recorded at tip — nothing to commit."; exit 0
            fi
            git commit -m "approve(${{ inputs.environment }}): ${{ needs.select.outputs.services }} by ${{ steps.appr.outputs.by }}"
            git push origin HEAD:main && exit 0
            echo "push retry $i"; sleep 3
          done
          echo "::error::could not push approval record after retries"; exit 1
