# =============================================================================
# RELEASE — the single release console for staging & prod
# Repo: mbeema/platform-releases
#
# Two ways to release, both gated by the target environment's required reviewers:
#   • Promote (version blank): ship the latest build from the env below
#     (dev→staging or staging→prod). Supports one, many, or 'all' services.
#   • Pin a specific build (version set): release/redeploy an EXACT version of
#     ONE service — e.g. promote a chosen build, or roll back to a known-good one.
# =============================================================================
name: release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod
        default: staging
      services:
        description: "Service(s): one name, comma-list, or 'all'. For a specific version, name exactly ONE."
        required: true
        default: "all"
      version:
        description: "Specific build to release (a vX.Y.Z tag or sha-xxxxxxx). Blank = promote latest from the env below."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.sel.outputs.selected }}
      has: ${{ steps.sel.outputs.has }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve & pin target ledger
        id: sel
        env:
          GH_TOKEN: ${{ github.token }}
          SVC: ${{ inputs.services }}
          VER: ${{ inputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -e
          if [ -n "$VER" ]; then
            # ---- PIN a specific build (single service) ----
            case "$SVC" in
              *,*|all|ALL) echo "::error::a specific version needs exactly one service"; exit 1;;
            esac
            case "$VER" in
              sha-*)
                IMM="$VER"; SEMVER="" ;;
              *)
                # resolve a semver tag to its immutable build sha in the service repo
                FULL="$(gh api "repos/mbeema/service-${SVC}/commits/${VER}" --jq .sha)"
                IMM="sha-${FULL:0:7}"; SEMVER="$VER" ;;
            esac
            echo "Pinning ${SVC} -> ${IMM} (${SEMVER:-no semver}) in ${ENVIRONMENT}"
            python3 scripts/select_release.py \
              --to "environments/${ENVIRONMENT}.json" \
              --select "$SVC" --version "$IMM" --semver "$SEMVER"
          else
            # ---- PROMOTE from the env below ----
            if [ "$ENVIRONMENT" = "prod" ]; then SRC=staging; else SRC=dev; fi
            echo "Promoting '$SVC' from ${SRC} to ${ENVIRONMENT}"
            python3 scripts/select_release.py \
              --to "environments/${ENVIRONMENT}.json" \
              --from "environments/${SRC}.json" --select "$SVC"
          fi

      - name: Record the release
        if: steps.sel.outputs.has == 'true'
        run: |
          git config user.name  "release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add "environments/${{ inputs.environment }}.json"
          git commit -m "release(${{ inputs.environment }}): ${{ inputs.services }} ${{ inputs.version }}"
          git push

      - name: Nothing to release
        if: steps.sel.outputs.has != 'true'
        run: echo "Nothing to release for '${{ inputs.services }}' → ${{ inputs.environment }}."

  deploy:
    needs: select
    if: needs.select.outputs.has == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.select.outputs.matrix) }}
    uses: mbeema/platform-pipelines/.github/workflows/reusable-deploy-poc.yml@v1
    with:
      environment: ${{ inputs.environment }}
      app_name: ${{ matrix.target.service }}-${{ inputs.environment }}
      version: ${{ matrix.target.version }}
