# =============================================================================
# DASHBOARD — publish the single pane (services x environments) to GitHub Pages
# Repo: mbeema/platform-releases
#
# Regenerates after every release/promote, on ledger changes, on a schedule,
# and on demand. The live pane lives at the Pages URL.
# =============================================================================
name: dashboard

on:
  workflow_run:
    workflows: [release]
    types: [completed]
  push:
    branches: [main]
    paths: ["ledger/**"]
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Render dashboard
        run: |
          mkdir -p _site
          python3 scripts/dashboard.py --standalone _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
